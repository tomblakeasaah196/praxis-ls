name: CI

# Backend CI for praxis-ls. Runs on every push to main and every PR (the repo
# uses a PR-based workflow per the kickoff). Deliberately does NOT deploy —
# deployment target/secrets aren't decided yet (see doc/WORK_TO_BE_DONE.md
# Phase 5). This gate is: does it parse, lint, test, and does the image build.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Syntax check every source file
        # node --check catches parse/syntax errors the linter's config might skip
        # and needs no DB/Redis — the cheapest possible "it at least parses" gate.
        run: |
          find src scripts -name '*.js' -print0 | xargs -0 -n1 node --check

      - name: Lint
        run: npm run lint

      - name: Test
        # --passWithNoTests keeps the pipeline green until the first real specs
        # land (jest exits non-zero on an empty suite otherwise). Remove the flag
        # once src/**/*.test.js exists.
        run: npx jest --runInBand --passWithNoTests

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image (no push)
        # Catches Dockerfile breakage without needing a registry. Builds the
        # runtime stage; the worker stage shares the same base.
        run: docker build --target runtime -t praxis-ls:ci .
